<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCAEGIUM — Ae · 121 · 360</title>
<link rel="icon" type="image/png" href="assets/logos/Logo_Element_brass.png">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=VT323&display=swap" rel="stylesheet">
<style>
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --cyber: #00d4ff;
  --steam: #c8860a;
  --cyber-glow: rgba(0,212,255,0.35);
  --steam-glow: rgba(200,134,10,0.35);
}

html, body {
  width:100%; height:100%;
  overflow:hidden;
  background:#000;
  cursor:crosshair;
}

/* ── CANVAS STACK ──────────────────────────────
   z1  cvsBg      — background images (canvas-clipped)
   z2  cvsOverlay — scanline sweep
   z3  cvsDivider — dividing line
   z4  UI         — text content, terminal lines
   z5  cvsFx      — arc electricity + logo particles
   z6  logoWrap   — compass rose logo
   z7  footer     — copyright bar
   z10 flash      — black fade to black
───────────────────────────────────────────── */
#cvsBg, #cvsOverlay, #cvsDivider, #cvsFx {
  position: fixed; inset: 0; pointer-events: none;
}
#cvsBg      { z-index: 1; }
#cvsOverlay { z-index: 2; }
#cvsDivider { z-index: 3; }
#cvsFx      { z-index: 5; }

/* ── TERMINAL LINES — ambient cyber text ── */
#termLines {
  position: fixed; top: 0; left: 0;
  width: 50vw; height: 50vh;
  z-index: 4;
  pointer-events: none; overflow: hidden;
  padding: 0.8rem 1.2rem;
  opacity: 0.055;
  display: flex; flex-direction: column;
  justify-content: flex-end; gap: 1px;
}
.tline {
  font-family: 'VT323', monospace;
  font-size: 0.68rem; color: var(--cyber);
  letter-spacing: 0.07em; white-space: nowrap;
}

/* ── WORKER CONTENT — upper left ── */
#workerContent {
  position: fixed; top: 9vh; left: 5vw;
  z-index: 4; max-width: 38vw;
  opacity: 0;
  animation: fadeUp 1s ease forwards 0.4s;
}
/* ── WORKSHOP CONTENT — lower right ── */
#workshopContent {
  position: fixed; bottom: 9vh; right: 5vw;
  z-index: 4; max-width: 38vw; text-align: right;
  opacity: 0;
  animation: fadeUp 1s ease forwards 0.7s;
}

/* shared label — small amber on worker, small cyan on workshop */
.cy-eye {
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(0.5rem, 0.85vw, 0.62rem);
  letter-spacing: 0.45em; text-transform: uppercase;
  color: var(--steam); opacity: 0.9;
  margin-bottom: 0.5rem;
}
.st-eye {
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(0.5rem, 0.85vw, 0.62rem);
  letter-spacing: 0.45em; text-transform: uppercase;
  color: var(--cyber); opacity: 0.9;
  margin-bottom: 0.5rem;
}

/* shared title — Orbitron, white, side-specific glow */
.cy-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(1.5rem, 3.2vw, 2.6rem);
  font-weight: 900; letter-spacing: 0.06em;
  color: #fff; line-height: 1.05;
  text-shadow: 0 0 18px var(--cyber-glow);
}
.st-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(1.5rem, 3.2vw, 2.6rem);
  font-weight: 900; letter-spacing: 0.06em;
  color: #fff; line-height: 1.05;
  text-shadow: 0 0 18px var(--steam-glow);
}

/* shared CTA buttons */
.cy-cta, .st-cta {
  display: inline-block; margin-top: 1rem;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.58rem; letter-spacing: 0.32em; text-transform: uppercase;
  padding: 0.35rem 0.8rem;
  opacity: 0.8; cursor: pointer; text-decoration: none;
  transition: opacity 0.3s, box-shadow 0.3s;
}
.cy-cta {
  color: var(--steam); border: 1px solid var(--steam);
}
.cy-cta::after { content: ' ▶'; }
.cy-cta:hover  { opacity: 1; box-shadow: 0 0 14px var(--steam-glow); }

.st-cta {
  color: var(--cyber); border: 1px solid var(--cyber);
}
.st-cta::before { content: '◀ '; }
.st-cta:hover   { opacity: 1; box-shadow: 0 0 14px var(--cyber-glow); }

/* ── LOGO ── */
#logoWrap {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 6;
  width: clamp(160px, 22vw, 300px);
  height: clamp(160px, 22vw, 300px);
  pointer-events: none;
}
#logoWrap img {
  width: 100%; height: 100%; object-fit: contain;
  filter:
    drop-shadow(0 0 12px rgba(0,212,255,0.5))
    drop-shadow(0 0 28px rgba(200,134,10,0.4));
}

/* ── FOOTER ── */
#footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 7;
  display: flex; justify-content: center; align-items: center;
  padding: 0.5rem 1.5rem;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  border-top: 1px solid rgba(255,255,255,0.08);
  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(4px);
  pointer-events: none;
}

/* ── FLASH OVERLAY ── */
#flash {
  position: fixed; inset: 0; z-index: 10;
  background: #000; opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s;
}
#flash.on { opacity: 1; pointer-events: all; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<!-- Canvas layers — all rendering, no clip-path divs -->
<canvas id="cvsBg"></canvas>
<canvas id="cvsOverlay"></canvas>
<canvas id="cvsDivider"></canvas>

<!-- UI text layers -->
<div id="termLines"></div>

<div id="workerContent">
  <p class="cy-eye">Profile</p>
  <h2 class="cy-title">The Worker</h2>
  <a class="cy-cta" href="/profile/">Access File</a>
</div>

<div id="workshopContent">
  <h2 class="st-title">The Workshop</h2>
  <p class="st-eye">Portfolio</p>
  <a class="st-cta" href="/workshop/">Enter Shop</a>
</div>

<!-- Logo sits above fx canvas -->
<div id="logoWrap">
  <img src="assets/logos/Logo_Circle.png" alt="Arcaegium">
</div>

<div id="footer">
  <span>ARCAEGIUM.COM &nbsp;&#11825;&nbsp; © 2026 ARCAEGIUM &nbsp;&#11825;&nbsp; ALL RIGHTS RESERVED</span>
</div>

<!-- fx canvas and flash are last in DOM — guaranteed above everything -->
<canvas id="cvsFx"></canvas>
<div id="flash"></div>

<script>
(function () {

  /* ── CANVAS CONTEXTS ── */
  const bgCtx  = document.getElementById('cvsBg').getContext('2d');
  const ovCtx  = document.getElementById('cvsOverlay').getContext('2d');
  const dCtx   = document.getElementById('cvsDivider').getContext('2d');
  const fxCtx  = document.getElementById('cvsFx').getContext('2d');
  const cvsBg      = document.getElementById('cvsBg');
  const cvsOverlay = document.getElementById('cvsOverlay');
  const cvsDivider = document.getElementById('cvsDivider');
  const cvsFx      = document.getElementById('cvsFx');
  const flash      = document.getElementById('flash');

  let W, H;
  let leanTarget = 0;   /* -1 = full cyber, +1 = full steam (positive = steam winning) */
  let leanSmooth = 0;
  let navigating = false;

  /* ── BACKGROUND IMAGES ── */
  const imgCyber = new Image(), imgSteam = new Image();
  let cyberLoaded = false, steamLoaded = false;
  imgCyber.onload = () => { cyberLoaded = true; };
  imgSteam.onload = () => { steamLoaded = true; };
  imgCyber.src = 'assets/backgrounds/Worker_Background.png';
  imgSteam.src = 'assets/backgrounds/Workshop_Background.png';

  /* ── RESIZE ── */
  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    [cvsBg, cvsOverlay, cvsDivider, cvsFx].forEach(c => { c.width = W; c.height = H; });
    LOGO_R = Math.min(W, H) * 0.09;
  }
  window.addEventListener('resize', resize);

  /* ── LINE GEOMETRY ──────────────────────────────────
     Diagonal runs top-right (W,0) → bottom-left (0,H).
     Line equation: x/W + y/H = 1
       upper-left (cyber) = value < 1
       lower-right (steam) = value > 1
     lean > 0 = steam winning (line shifts toward upper-left)
     lean < 0 = cyber winning (line shifts toward lower-right)
     Offset perpendicular to the diagonal.
  ──────────────────────────────────────────────────── */
  function getLine(lean) {
    const mag = lean * 0.25 * Math.min(W, H);
    const len = Math.sqrt(W * W + H * H);
    return {
      ax: W + (H / len) * mag,
      ay: 0 + (W / len) * mag,
      bx: 0 + (H / len) * mag,
      by: H + (W / len) * mag,
    };
  }

  /* ── BACKGROUND DRAW — canvas clip, no CSS clip-path ── */
  function coverFit(ctx, img) {
    const s  = Math.max(W / img.width, H / img.height);
    const iw = img.width * s, ih = img.height * s;
    ctx.drawImage(img, (W - iw) / 2, (H - ih) / 2, iw, ih);
  }

  function drawBg(lean) {
    bgCtx.clearRect(0, 0, W, H);
    const { ax, ay, bx, by } = getLine(lean);

    /* cyber — upper-left */
    bgCtx.save();
    bgCtx.beginPath();
    bgCtx.moveTo(0, 0); bgCtx.lineTo(W, 0);
    bgCtx.lineTo(ax, ay); bgCtx.lineTo(bx, by);
    bgCtx.lineTo(0, H); bgCtx.closePath();
    bgCtx.clip();
    cyberLoaded ? coverFit(bgCtx, imgCyber) : (bgCtx.fillStyle = '#020a10', bgCtx.fillRect(0, 0, W, H));
    bgCtx.restore();

    /* steam — lower-right */
    bgCtx.save();
    bgCtx.beginPath();
    bgCtx.moveTo(ax, ay); bgCtx.lineTo(W, 0);
    bgCtx.lineTo(W, H); bgCtx.lineTo(0, H);
    bgCtx.lineTo(bx, by); bgCtx.closePath();
    bgCtx.clip();
    steamLoaded ? coverFit(bgCtx, imgSteam) : (bgCtx.fillStyle = '#0d0805', bgCtx.fillRect(0, 0, W, H));
    bgCtx.restore();
  }

  /* ── SCANLINE OVERLAY — cyber side only ── */
  function drawOverlay(lean, t) {
    ovCtx.clearRect(0, 0, W, H);
    const { ax, ay, bx, by } = getLine(lean);

    ovCtx.save();
    ovCtx.beginPath();
    ovCtx.moveTo(0, 0); ovCtx.lineTo(W, 0);
    ovCtx.lineTo(ax, ay); ovCtx.lineTo(bx, by);
    ovCtx.lineTo(0, H); ovCtx.closePath();
    ovCtx.clip();

    const sy = (t * 55) % H;
    const sg = ovCtx.createLinearGradient(0, sy - 1, 0, sy + 1);
    sg.addColorStop(0, 'transparent');
    sg.addColorStop(0.5, 'rgba(0,212,255,0.05)');
    sg.addColorStop(1, 'transparent');
    ovCtx.fillStyle = sg;
    ovCtx.fillRect(0, sy - 1, W, 2);
    ovCtx.restore();
  }

  /* ── DIVIDER LINE ── */
  function drawDivider(lean) {
    dCtx.clearRect(0, 0, W, H);
    const { ax, ay, bx, by } = getLine(lean);

    const g = dCtx.createLinearGradient(ax, ay, bx, by);
    g.addColorStop(0,   'rgba(0,212,255,0.0)');
    g.addColorStop(0.2, 'rgba(0,212,255,0.6)');
    g.addColorStop(0.5, 'rgba(255,255,255,0.9)');
    g.addColorStop(0.8, 'rgba(200,134,10,0.6)');
    g.addColorStop(1,   'rgba(200,134,10,0.0)');

    /* outer glow */
    dCtx.beginPath(); dCtx.moveTo(ax, ay); dCtx.lineTo(bx, by);
    dCtx.strokeStyle = 'rgba(180,180,180,0.05)'; dCtx.lineWidth = 18; dCtx.stroke();
    /* mid glow */
    dCtx.beginPath(); dCtx.moveTo(ax, ay); dCtx.lineTo(bx, by);
    dCtx.strokeStyle = 'rgba(180,180,180,0.10)'; dCtx.lineWidth = 5;  dCtx.stroke();
    /* core */
    dCtx.beginPath(); dCtx.moveTo(ax, ay); dCtx.lineTo(bx, by);
    dCtx.strokeStyle = g; dCtx.lineWidth = 1.5; dCtx.stroke();
  }

  /* ── ARC ELECTRICITY ── */
  const arcs = [];
  let nextArcTime = 0;

  function spawnArc(ax, ay, bx, by, now) {
    const t   = 0.15 + Math.random() * 0.7;
    const ox  = ax + (bx - ax) * t;
    const oy  = ay + (by - ay) * t;
    const len = Math.sqrt((bx - ax) ** 2 + (by - ay) ** 2);
    const px  = -(by - ay) / len;
    const py  =  (bx - ax) / len;
    const reach = 20 + Math.random() * 40;
    const steps = 6 + Math.floor(Math.random() * 5);
    const pts = [{ x: ox, y: oy }];
    for (let i = 1; i <= steps; i++) {
      const f = i / steps;
      pts.push({
        x: ox + px * reach * Math.sin(f * Math.PI) + (Math.random() - 0.5) * 12,
        y: oy + py * reach * Math.sin(f * Math.PI) + (Math.random() - 0.5) * 12,
      });
    }
    pts.push({ x: ox, y: oy });
    arcs.push({ pts, born: now, life: 150 + Math.random() * 250, isCyber: Math.random() < 0.5 });
  }

  function drawArcs(now) {
    for (let i = arcs.length - 1; i >= 0; i--) {
      const arc = arcs[i];
      const age = (now - arc.born) / arc.life;
      if (age >= 1) { arcs.splice(i, 1); continue; }
      const al  = Math.sin(age * Math.PI);
      const rgb = arc.isCyber ? '0,212,255' : '200,134,10';
      /* glow pass */
      fxCtx.beginPath();
      fxCtx.moveTo(arc.pts[0].x, arc.pts[0].y);
      arc.pts.slice(1).forEach(p => fxCtx.lineTo(p.x, p.y));
      fxCtx.strokeStyle = `rgba(${rgb},${al * 0.3})`; fxCtx.lineWidth = 4; fxCtx.stroke();
      /* core pass */
      fxCtx.beginPath();
      fxCtx.moveTo(arc.pts[0].x, arc.pts[0].y);
      arc.pts.slice(1).forEach(p => fxCtx.lineTo(p.x, p.y));
      fxCtx.strokeStyle = `rgba(${rgb},${al})`; fxCtx.lineWidth = 1.5; fxCtx.stroke();
    }
  }

  /* ── LOGO PARTICLES ── */
  const logoParticles = [];
  let nextLogoParticle = 0;
  let LOGO_R = 80;

  function spawnLogoParticle(now) {
    const cx = W / 2, cy = H / 2;
    const angle  = Math.random() * Math.PI * 2;
    const spawnR = LOGO_R * 1.4;
    const px = cx + Math.cos(angle) * spawnR;
    const py = cy + Math.sin(angle) * spawnR;
    const onCyber = (px / W + py / H) < 1;
    const speed = 0.06 + Math.random() * 0.12;
    logoParticles.push({
      x: px, y: py,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      wobbleAmp:   (Math.random() - 0.5) * 0.03,
      wobbleFreq:  0.4 + Math.random() * 1.2,
      wobblePhase: Math.random() * Math.PI * 2,
      r:    1.2 + Math.random() * 1.8,
      born: now,
      life: 4000 + Math.random() * 3000,
      col:  onCyber ? '200,134,10' : '0,212,255',
    });
  }

  function drawLogoParticles(now) {
    if (now >= nextLogoParticle) {
      spawnLogoParticle(now);
      nextLogoParticle = now + 60 + Math.random() * 80;
    }
    for (let i = logoParticles.length - 1; i >= 0; i--) {
      const p   = logoParticles[i];
      const age = (now - p.born) / p.life;
      if (age >= 1) { logoParticles.splice(i, 1); continue; }
      const al  = Math.pow(1 - age, 0.5);
      const dir = Math.atan2(p.vy, p.vx);
      const w   = Math.sin(now / 1000 * p.wobbleFreq + p.wobblePhase) * p.wobbleAmp;
      p.vx += -Math.sin(dir) * w;
      p.vy +=  Math.cos(dir) * w;
      p.vx *= 0.999; p.vy *= 0.999;
      p.x += p.vx; p.y += p.vy;
      fxCtx.beginPath(); fxCtx.arc(p.x, p.y, p.r * 2.5, 0, Math.PI * 2);
      fxCtx.fillStyle = `rgba(${p.col},${al * 0.15})`; fxCtx.fill();
      fxCtx.beginPath(); fxCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      fxCtx.fillStyle = `rgba(${p.col},${al})`; fxCtx.fill();
    }
  }

  function drawFx(lean, now) {
    fxCtx.clearRect(0, 0, W, H);
    const { ax, ay, bx, by } = getLine(lean);
    if (now >= nextArcTime) {
      spawnArc(ax, ay, bx, by, now);
      nextArcTime = now + 300 + Math.random() * 700;
    }
    drawArcs(now);
    drawLogoParticles(now);
  }

  /* ── TERMINAL LINES ── */
  const TERMINAL_LINES = [
    '> INITIALIZING ARCAEGIUM PROTOCOL...',
    '> AUTH: SESSION ACTIVE — TOKEN VALID',
    '> PORTFOLIO_LOAD: 18YRS_EXPERIENCE.dat',
    '> VENDOR.ecosystem: 100+ NODES MAPPED',
    '> REVENUE.stream: $6.5M — ACTIVE',
    '> RETENTION.index: 97.0% — NOMINAL',
    '> C-SUITE INTERFACE: READY',
    '> SALESFORCE.arch: OPTIMIZED',
    '> SOLUTION.engine: ONLINE',
    '> TAM_PROTOCOL: ENGAGED',
    '> DISCOVERY.module: STANDBY',
    '> ARCAEGIUM.os: v1.21.360',
  ];
  const termDiv = document.getElementById('termLines');
  TERMINAL_LINES.forEach(txt => {
    const d = document.createElement('div');
    d.className = 'tline'; d.textContent = txt;
    termDiv.appendChild(d);
  });

  /* ── MOUSE ── */
  document.addEventListener('mousemove', e => {
    if (navigating) return;
    const val = e.clientX / W + e.clientY / H;
    leanTarget = Math.max(-0.55, Math.min(0.55, (1 - val) * 1.5));
  });
  document.addEventListener('mouseleave', () => { if (!navigating) leanTarget = 0; });

  /* ── MAIN LOOP ── */
  let last = 0;
  resize();

  function loop(ts) {
    const dt = Math.min(ts - last, 50);
    last = ts;
    if (!navigating) {
      leanSmooth += (leanTarget - leanSmooth) * (1 - Math.exp(-dt / 1000));
    }
    drawBg(leanSmooth);
    drawOverlay(leanSmooth, ts / 1000);
    drawDivider(leanSmooth);
    drawFx(leanSmooth, ts);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  /* ── NAVIGATION ── */
  function nav(url, side) {
    if (navigating) return;
    navigating = true;

    const targetLean = side === 'cyber' ? 5 : -5;
    const startLean  = leanSmooth;
    const startTime  = performance.now();
    const TAKEOVER   = 600;   /* ms for line to sweep full screen */
    const HOLD       = 800;   /* ms to show full background before fade */
    const FADE       = 400;   /* ms black fade before navigation */

    /* fade out opposite content as the line sweeps over it */
    const opposite = side === 'cyber' ? 'workshopContent' : 'workerContent';
    setTimeout(() => {
      const el = document.getElementById(opposite);
      el.style.animation = 'none';
      el.style.transition = 'opacity 0.25s';
      el.style.opacity = '0';
      el.style.pointerEvents = 'none';
    }, TAKEOVER * 0.2);

    function animateTakeover(ts) {
      const progress = Math.min((ts - startTime) / TAKEOVER, 1);
      const eased = progress < 0.5
        ? 2 * progress * progress
        : 1 - Math.pow(-2 * progress + 2, 2) / 2;
      leanSmooth = startLean + (targetLean - startLean) * eased;
      drawBg(leanSmooth);
      drawOverlay(leanSmooth, ts / 1000);
      drawDivider(leanSmooth);
      drawFx(leanSmooth, ts);
      if (progress < 1) {
        requestAnimationFrame(animateTakeover);
      } else {
        setTimeout(() => {
          flash.classList.add('on');
          setTimeout(() => { window.location.href = url; }, FADE);
        }, HOLD);
      }
    }
    requestAnimationFrame(animateTakeover);
  }

  document.querySelector('.cy-cta').addEventListener('click', e => { e.preventDefault(); nav('/profile/', 'cyber'); });
  document.querySelector('.st-cta').addEventListener('click', e => { e.preventDefault(); nav('/workshop/', 'steam'); });

})();

/* ── BFCACHE FIX — force full reload on back-button restore ── */
window.addEventListener('pageshow', e => { if (e.persisted) window.location.reload(); });
</script>
</body>
</html>
