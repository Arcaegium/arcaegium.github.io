<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCAEGIUM — Ae · 121 · 360</title>
<link rel="icon" type="image/png" href="assets/logos/Logo_Element_brass.png">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=VT323&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --cyber-accent:#00d4ff;
  --cyber-glow:rgba(0,212,255,0.35);
  --steam-accent:#c8860a;
  --steam-glow:rgba(200,134,10,0.35);
}
html,body{width:100%;height:100%;overflow:hidden;background:#000;cursor:crosshair;}

/* ── CANVAS STACK ── no clip-path anywhere, no stacking context fights ── */
/* z1: background    z2: overlay effects    z3: divider line
   z4: UI text/logo  z5: fx particles/arcs  z6: flash          */
#cvsBg      {position:fixed;inset:0;z-index:1;pointer-events:none;}
#cvsOverlay {position:fixed;inset:0;z-index:2;pointer-events:none;}
#cvsDivider {position:fixed;inset:0;z-index:3;pointer-events:none;}
#cvsFx      {position:fixed;inset:0;z-index:5;pointer-events:none;}

/* ── TERMINAL AMBIENT ── sits above bg canvases ── */
#termLines{
  position:fixed;top:0;left:0;
  width:50vw;height:50vh;z-index:4;
  pointer-events:none;overflow:hidden;
  padding:0.8rem 1.2rem;opacity:0.055;
  display:flex;flex-direction:column;
  justify-content:flex-end;gap:1px;
}
.tline{
  font-family:'VT323',monospace;
  font-size:0.68rem;color:#00d4ff;
  letter-spacing:0.07em;white-space:nowrap;
}

/* ── UI LAYER ── z-index 4, same as terminal ── */
#workerContent{
  position:fixed;top:9vh;left:5vw;
  z-index:4;max-width:38vw;
  opacity:0;animation:fadeUp 1s ease forwards 0.4s;
}
.cy-eye{
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(0.5rem,0.85vw,0.62rem);
  letter-spacing:0.45em;color:var(--steam-accent);
  opacity:0.9;text-transform:uppercase;margin-bottom:0.5rem;
}
.cy-title{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(1.5rem,3.2vw,2.6rem);
  font-weight:900;letter-spacing:0.06em;
  color:#fff;line-height:1.05;
  text-shadow:0 0 18px var(--cyber-glow);
}
.cy-cta{
  display:inline-block;margin-top:1rem;
  font-family:'Share Tech Mono',monospace;
  font-size:0.58rem;letter-spacing:0.32em;
  color:var(--steam-accent);text-transform:uppercase;
  padding:0.35rem 0.8rem;border:1px solid var(--steam-accent);
  opacity:0.8;cursor:pointer;text-decoration:none;
  transition:opacity 0.3s,box-shadow 0.3s;
}
.cy-cta:hover{opacity:1;box-shadow:0 0 14px var(--steam-glow);}
.cy-cta::after{content:' ▶';}

#workshopContent{
  position:fixed;bottom:9vh;right:5vw;
  z-index:4;max-width:38vw;text-align:right;
  opacity:0;animation:fadeUp 1s ease forwards 0.7s;
}
.st-eye{
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(0.5rem,0.85vw,0.62rem);
  letter-spacing:0.45em;color:var(--cyber-accent);
  opacity:0.9;text-transform:uppercase;margin-bottom:0.5rem;
}
.st-title{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(1.5rem,3.2vw,2.6rem);
  font-weight:900;letter-spacing:0.06em;color:#fff;line-height:1.05;
  text-shadow:0 0 18px var(--steam-glow);
}
.st-cta{
  display:inline-block;margin-top:1rem;
  font-family:'Share Tech Mono',monospace;
  font-size:0.58rem;letter-spacing:0.32em;
  color:var(--cyber-accent);text-transform:uppercase;
  padding:0.35rem 0.8rem;border:1px solid var(--cyber-accent);
  opacity:0.8;cursor:pointer;text-decoration:none;
  transition:opacity 0.3s,box-shadow 0.3s;
}
.st-cta:hover{opacity:1;box-shadow:0 0 14px var(--cyber-glow);}
.st-cta::before{content:'◀ ';}

/* ── LOGO ── below fx canvas so particles render over it ── */
#logoWrap{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:4;
  width:clamp(160px,22vw,300px);
  height:clamp(160px,22vw,300px);
  pointer-events:none;
}
#logoWrap img{
  width:100%;height:100%;object-fit:contain;
  filter:drop-shadow(0 0 12px rgba(0,212,255,0.5)) drop-shadow(0 0 28px rgba(200,134,10,0.4));
}

/* ── FOOTER ── */
#footer{
  position:fixed;bottom:0;left:0;right:0;
  z-index:7;
  display:flex;justify-content:center;align-items:center;
  padding:0.5rem 1.5rem;
  font-family:'Share Tech Mono',monospace;
  font-size:0.55rem;letter-spacing:0.2em;
  text-transform:uppercase;
  border-top:1px solid rgba(255,255,255,0.08);
  background:rgba(0,0,0,0.25);
  backdrop-filter:blur(4px);
  pointer-events:none;
}
.foot-center{color:rgba(255,255,255,0.4);}

/* ── FLASH ── always on top ── */
#flash{position:fixed;inset:0;z-index:10;background:#000;opacity:0;pointer-events:none;transition:opacity 0.35s;}
#flash.on{opacity:1;pointer-events:all;}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<!-- ALL rendering happens on canvases — no clip-path divs -->
<canvas id="cvsBg"></canvas>
<canvas id="cvsOverlay"></canvas>
<canvas id="cvsDivider"></canvas>

<div id="termLines"></div>

<div id="workerContent">
  <p class="cy-eye">Profile</p>
  <h2 class="cy-title">The Worker</h2>
  <a class="cy-cta" href="/profile/">Access File</a>
</div>

<div id="workshopContent">
  <h2 class="st-title">The Workshop</h2>
  <p class="st-eye">Portfolio</p>
  <a class="st-cta" href="/workshop/">Enter Shop</a>
</div>

<div id="logoWrap">
  <img src="assets/logos/Logo_Circle.png" alt="Arcaegium">
</div>

<div id="footer">
  <span class="foot-center">ARCAEGIUM.COM &nbsp;&#11825;&nbsp; © 2026 ARCAEGIUM &nbsp;&#11825;&nbsp; ALL RIGHTS RESERVED</span>
</div>

<!-- fx canvas and flash are last — guaranteed on top -->
<canvas id="cvsFx"></canvas>
<div id="flash"></div>

<script>
(function(){

  /* ── CANVAS CONTEXTS ── */
  const cvsBg      = document.getElementById('cvsBg');
  const cvsOverlay = document.getElementById('cvsOverlay');
  const cvsDivider = document.getElementById('cvsDivider');
  const cvsFx      = document.getElementById('cvsFx');
  const bgCtx  = cvsBg.getContext('2d');
  const ovCtx  = cvsOverlay.getContext('2d');
  const dCtx   = cvsDivider.getContext('2d');
  const fxCtx  = cvsFx.getContext('2d');
  const flash  = document.getElementById('flash');

  let W, H;
  let leanTarget = 0;
  let leanSmooth = 0;
  let navigating = false;

  /* ── BACKGROUND IMAGES ── preload before drawing ── */
  const imgCyber = new Image();
  const imgSteam = new Image();
  let cyberLoaded = false, steamLoaded = false;
  imgCyber.onload = () => { cyberLoaded = true; };
  imgSteam.onload = () => { steamLoaded = true; };
  imgCyber.src = 'assets/backgrounds/Worker_Background.png';
  imgSteam.src = 'assets/backgrounds/Workshop_Background.png';

  /* ── RESIZE ── */
  function resize(){
    W = window.innerWidth; H = window.innerHeight;
    [cvsBg,cvsOverlay,cvsDivider,cvsFx].forEach(c=>{c.width=W;c.height=H;});
    initCyberP(); initSteamP();
    LOGO_R = Math.min(W,H) * 0.09;
  }
  window.addEventListener('resize', resize);

  /* ── LINE GEOMETRY ──
     Diagonal: top-right (W,0) → bottom-left (0,H)
     lean < 0 = cyber (upper-left) winning
     lean > 0 = steam (lower-right) winning
  */
  function getLine(lean){
    const mag = lean * 0.25 * Math.min(W,H);
    const len = Math.sqrt(W*W + H*H);
    const px  = H/len;
    const py  = W/len;
    return {
      ax: W + px*mag,
      ay: 0 + py*mag,
      bx: 0 + px*mag,
      by: H + py*mag,
    };
  }

  /* ── DRAW BACKGROUNDS — clipped on canvas, no clip-path divs ── */
  function drawBg(lean){
    bgCtx.clearRect(0,0,W,H);
    const {ax,ay,bx,by} = getLine(lean);

    /* cyber = upper-left polygon */
    bgCtx.save();
    bgCtx.beginPath();
    bgCtx.moveTo(0,0);
    bgCtx.lineTo(W,0);
    bgCtx.lineTo(ax,ay);
    bgCtx.lineTo(bx,by);
    bgCtx.lineTo(0,H);
    bgCtx.closePath();
    bgCtx.clip();
    if(cyberLoaded){
      /* draw image cover-fit */
      const s  = Math.max(W/imgCyber.width, H/imgCyber.height);
      const iw = imgCyber.width*s, ih = imgCyber.height*s;
      bgCtx.drawImage(imgCyber,(W-iw)/2,(H-ih)/2,iw,ih);
    } else {
      bgCtx.fillStyle='#020a10'; bgCtx.fillRect(0,0,W,H);
    }
    bgCtx.restore();

    /* steam = lower-right polygon */
    bgCtx.save();
    bgCtx.beginPath();
    bgCtx.moveTo(ax,ay);
    bgCtx.lineTo(W,0);
    bgCtx.lineTo(W,H);
    bgCtx.lineTo(0,H);
    bgCtx.lineTo(bx,by);
    bgCtx.closePath();
    bgCtx.clip();
    if(steamLoaded){
      const s  = Math.max(W/imgSteam.width, H/imgSteam.height);
      const iw = imgSteam.width*s, ih = imgSteam.height*s;
      bgCtx.drawImage(imgSteam,(W-iw)/2,(H-ih)/2,iw,ih);
    } else {
      bgCtx.fillStyle='#0d0805'; bgCtx.fillRect(0,0,W,H);
    }
    bgCtx.restore();
  }

  /* ── DRAW OVERLAY — scanlines on cyber side only ── */
  function drawOverlay(lean, t){
    ovCtx.clearRect(0,0,W,H);
    const {ax,ay,bx,by} = getLine(lean);

    ovCtx.save();
    ovCtx.beginPath();
    ovCtx.moveTo(0,0); ovCtx.lineTo(W,0);
    ovCtx.lineTo(ax,ay); ovCtx.lineTo(bx,by);
    ovCtx.lineTo(0,H); ovCtx.closePath();
    ovCtx.clip();

    const sy = (t*55)%H;
    const sg = ovCtx.createLinearGradient(0,sy-1,0,sy+1);
    sg.addColorStop(0,'transparent');
    sg.addColorStop(0.5,'rgba(0,212,255,0.05)');
    sg.addColorStop(1,'transparent');
    ovCtx.fillStyle=sg; ovCtx.fillRect(0,sy-1,W,2);
    ovCtx.restore();
  }

  /* ── PARTICLE SYSTEMS ── ambient particles removed, only logo particles remain ── */
  let cyP=[], stP=[];

  function randomCyberPos(){
    let x, y;
    do { x=Math.random()*W; y=Math.random()*H; } while(x/W+y/H>=1);
    return {x,y};
  }
  function randomSteamPos(){
    let x, y;
    do { x=Math.random()*W; y=Math.random()*H; } while(x/W+y/H<=1);
    return {x,y};
  }

  function initCyberP(){ cyP=[]; }
  function initSteamP(){ stP=[]; }

  /* ── DIVIDER LINE ── */
  function drawDivider(lean){
    dCtx.clearRect(0,0,W,H);
    const {ax,ay,bx,by} = getLine(lean);
    const g = dCtx.createLinearGradient(ax,ay,bx,by);
    g.addColorStop(0,  'rgba(0,212,255,0.0)');
    g.addColorStop(0.2,'rgba(0,212,255,0.6)');
    g.addColorStop(0.5,'rgba(255,255,255,0.9)');
    g.addColorStop(0.8,'rgba(200,134,10,0.6)');
    g.addColorStop(1,  'rgba(200,134,10,0.0)');
    dCtx.beginPath(); dCtx.moveTo(ax,ay); dCtx.lineTo(bx,by);
    dCtx.strokeStyle='rgba(180,180,180,0.05)'; dCtx.lineWidth=18; dCtx.stroke();
    dCtx.beginPath(); dCtx.moveTo(ax,ay); dCtx.lineTo(bx,by);
    dCtx.strokeStyle='rgba(180,180,180,0.10)'; dCtx.lineWidth=5; dCtx.stroke();
    dCtx.beginPath(); dCtx.moveTo(ax,ay); dCtx.lineTo(bx,by);
    dCtx.strokeStyle=g; dCtx.lineWidth=1.5; dCtx.stroke();
  }

  /* ── ARC ELECTRICITY ── drawn on fxCtx ── */
  const arcs = [];
  let nextArcTime = 0;

  function spawnArc(ax,ay,bx,by,now){
    const t  = 0.15 + Math.random()*0.7;
    const ox = ax + (bx-ax)*t;
    const oy = ay + (by-ay)*t;
    const len = Math.sqrt((bx-ax)**2+(by-ay)**2);
    const px  = -(by-ay)/len;
    const py  =  (bx-ax)/len;
    const reach = 20 + Math.random()*40;   /* bigger reach */
    const pts   = [{x:ox,y:oy}];
    const steps = 6 + Math.floor(Math.random()*5);
    for(let i=1;i<=steps;i++){
      const frac = i/steps;
      pts.push({
        x: ox + px*reach*Math.sin(frac*Math.PI) + (Math.random()-0.5)*12,
        y: oy + py*reach*Math.sin(frac*Math.PI) + (Math.random()-0.5)*12,
      });
    }
    pts.push({x:ox,y:oy});
    arcs.push({pts, born:now, life:150+Math.random()*250, isCyber:Math.random()<0.5});
  }

  function drawArcs(now){
    for(let i=arcs.length-1;i>=0;i--){
      const arc = arcs[i];
      const age = (now-arc.born)/arc.life;
      if(age>=1){arcs.splice(i,1);continue;}
      const al  = Math.sin(age*Math.PI)*1.0;   /* full opacity at peak */
      const col = arc.isCyber?`rgba(0,212,255,${al})`:`rgba(200,134,10,${al})`;
      /* glow pass */
      fxCtx.beginPath();
      fxCtx.moveTo(arc.pts[0].x,arc.pts[0].y);
      arc.pts.slice(1).forEach(p=>fxCtx.lineTo(p.x,p.y));
      fxCtx.strokeStyle=arc.isCyber?`rgba(0,212,255,${al*0.3})`:`rgba(200,134,10,${al*0.3})`;
      fxCtx.lineWidth=4; fxCtx.stroke();
      /* core pass */
      fxCtx.beginPath();
      fxCtx.moveTo(arc.pts[0].x,arc.pts[0].y);
      arc.pts.slice(1).forEach(p=>fxCtx.lineTo(p.x,p.y));
      fxCtx.strokeStyle=col; fxCtx.lineWidth=1.5; fxCtx.stroke();
    }
  }

  /* ── LOGO PARTICLES ── drawn on fxCtx ── */
  const logoParticles = [];
  let nextLogoParticle = 0;
  let LOGO_R = 80;

  function spawnLogoParticle(lean,now){
    const cx = W/2, cy = H/2;
    const angle = Math.random()*Math.PI*2;
    const spawnR = LOGO_R * 1.4;  /* further out */
    const px = cx + Math.cos(angle)*spawnR;
    const py = cy + Math.sin(angle)*spawnR;
    const onCyber = (px/W + py/H) < 1;
    const speed = 0.06 + Math.random()*0.12;  /* much slower */
    logoParticles.push({
      x:px, y:py,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed,
      wobbleAmp:  (Math.random()-0.5)*0.03,
      wobbleFreq: 0.4 + Math.random()*1.2,
      wobblePhase: Math.random()*Math.PI*2,
      a:1.0,
      r:1.2+Math.random()*1.8,              /* smaller: 1.2-3px */
      born:now,
      life:4000+Math.random()*3000,         /* longer life for slow drift */
      col:onCyber?'200,134,10':'0,212,255',
    });
  }

  function drawLogoParticles(lean,now){
    if(now>=nextLogoParticle){
      spawnLogoParticle(lean,now);
      nextLogoParticle = now + 60 + Math.random()*80;
    }
    for(let i=logoParticles.length-1;i>=0;i--){
      const p = logoParticles[i];
      const age = (now-p.born)/p.life;
      if(age>=1){logoParticles.splice(i,1);continue;}
      const al = p.a*Math.pow(1-age, 0.5);  /* very slow fade */
      /* wobble perpendicular to travel */
      const dir = Math.atan2(p.vy,p.vx);
      const w = Math.sin(now/1000*p.wobbleFreq+p.wobblePhase)*p.wobbleAmp;
      p.vx += -Math.sin(dir)*w;
      p.vy +=  Math.cos(dir)*w;
      p.vx *= 0.999; p.vy *= 0.999;
      p.x+=p.vx; p.y+=p.vy;
      /* glow */
      fxCtx.beginPath(); fxCtx.arc(p.x,p.y,p.r*2.5,0,Math.PI*2);
      fxCtx.fillStyle=`rgba(${p.col},${al*0.15})`; fxCtx.fill();
      /* core */
      fxCtx.beginPath(); fxCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
      fxCtx.fillStyle=`rgba(${p.col},${al})`; fxCtx.fill();
    }
  }

  function drawFx(lean,now){
    fxCtx.clearRect(0,0,W,H);
    const {ax,ay,bx,by} = getLine(lean);
    if(now>=nextArcTime){
      spawnArc(ax,ay,bx,by,now);
      nextArcTime = now+300+Math.random()*700;
    }
    drawArcs(now);
    drawLogoParticles(lean,now);
  }

  /* ── TERMINAL LINES ── */
  const TLINES=[
    '> INITIALIZING ARCAEGIUM PROTOCOL...',
    '> AUTH: SESSION ACTIVE — TOKEN VALID',
    '> PORTFOLIO_LOAD: 18YRS_EXPERIENCE.dat',
    '> VENDOR.ecosystem: 100+ NODES MAPPED',
    '> REVENUE.stream: $6.5M — ACTIVE',
    '> RETENTION.index: 97.0% — NOMINAL',
    '> C-SUITE INTERFACE: READY',
    '> SALESFORCE.arch: OPTIMIZED',
    '> SOLUTION.engine: ONLINE',
    '> TAM_PROTOCOL: ENGAGED',
    '> DISCOVERY.module: STANDBY',
    '> ARCAEGIUM.os: v1.21.360',
  ];
  const tDiv=document.getElementById('termLines');
  TLINES.forEach(txt=>{
    const d=document.createElement('div');
    d.className='tline'; d.textContent=txt; tDiv.appendChild(d);
  });

  /* ── MOUSE ── */
  document.addEventListener('mousemove', e => {
    if(navigating) return;
    const val = e.clientX/W + e.clientY/H;
    const raw = (1 - val) * 1.5;
    leanTarget = Math.max(-0.55, Math.min(0.55, raw));
  });
  document.addEventListener('mouseleave', () => { if(!navigating) leanTarget = 0; });

  /* ── MAIN LOOP ── */
  let last = 0;
  resize();

  function loop(ts){
    const t  = ts/1000;
    const dt = Math.min(ts-last, 50);
    last = ts;
    if(!navigating){
      const alpha = 1 - Math.exp(-1 * dt/1000);
      leanSmooth += (leanTarget-leanSmooth)*alpha;
    }
    drawBg(leanSmooth);
    drawOverlay(leanSmooth, t);
    drawDivider(leanSmooth);
    drawFx(leanSmooth, ts);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  /* ── NAVIGATION ── */
  function nav(url, side){
    if(navigating) return;
    navigating = true;

    const targetLean = side==='cyber' ? 5 : -5;
    const startLean  = leanSmooth;
    const startTime  = performance.now();
    const takeover   = 600;
    const hold       = 800;
    const fadeMs     = 400;

    /* fade out opposite content when line sweeps over it (~20% through takeover) */
    const fadeDelay = takeover * 0.2;
    if(side==='cyber'){
      const wc = document.getElementById('workshopContent');
      setTimeout(()=>{
        wc.style.transition='opacity 0.25s';
        wc.style.opacity='0';
        wc.style.pointerEvents='none';
      }, fadeDelay);
    } else {
      const wc = document.getElementById('workerContent');
      setTimeout(()=>{
        wc.style.transition='opacity 0.25s';
        wc.style.opacity='0';
        wc.style.pointerEvents='none';
      }, fadeDelay);
    }

    function animateTakeover(ts){
      const elapsed  = ts-startTime;
      const progress = Math.min(elapsed/takeover, 1);
      const eased    = progress<0.5
        ? 2*progress*progress
        : 1-Math.pow(-2*progress+2,2)/2;
      leanSmooth = startLean+(targetLean-startLean)*eased;
      drawBg(leanSmooth);
      drawOverlay(leanSmooth, ts/1000);
      drawDivider(leanSmooth);
      drawFx(leanSmooth, ts);
      if(progress<1){
        requestAnimationFrame(animateTakeover);
      } else {
        setTimeout(()=>{
          flash.classList.add('on');
          setTimeout(()=>{ window.location.href=url; }, fadeMs);
        }, hold);
      }
    }
    requestAnimationFrame(animateTakeover);
  }

  document.querySelector('.cy-cta').addEventListener('click',e=>{e.preventDefault();nav('/profile/','cyber');});
  document.querySelector('.st-cta').addEventListener('click',e=>{e.preventDefault();nav('/workshop/','steam');});

})();

/* ── BFCACHE FIX ── */
window.addEventListener('pageshow', e => {
  if(e.persisted) window.location.reload();
});
</script>
</body>
</html>
